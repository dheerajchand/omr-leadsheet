name: blocking I/O timeout check (writing-code:15)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Scan for unbounded blocking I/O calls
        run: python3 scripts/check_unbounded_io.py . --exclude-tests
